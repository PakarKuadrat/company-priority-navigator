<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Company Priority Navigator | ITSB Corporation</title>
  <meta name="description" content="A two-minute company priority assessment by ITSB Corporation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#181442;--muted:#686783;--purple:#32209a;--blue:#353fc0;--red:#db0103;--lavender:#f0efff;--surface:#fff;--bg:#f7f9ff;--line:rgba(50,32,154,.14);--shadow:0 24px 70px rgba(50,32,154,.11)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--ink);font-family:Poppins,Arial,sans-serif}button,input,textarea{font:inherit}button{color:inherit}.shell{min-height:100vh;position:relative;overflow:hidden;padding:0 5vw;background:linear-gradient(rgba(50,32,154,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(50,32,154,.035) 1px,transparent 1px),radial-gradient(circle at 83% 18%,rgba(53,63,192,.12),transparent 31%),radial-gradient(circle at 8% 82%,rgba(219,1,3,.07),transparent 27%),var(--bg);background-size:52px 52px,52px 52px,auto,auto,auto}.topbar{max-width:1380px;height:106px;margin:auto;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:relative;z-index:4}.brand{display:flex;align-items:center;gap:17px;background:none;border:0;padding:0;cursor:pointer}.corp-logo{display:block;width:176px;height:48px;position:relative;overflow:hidden}.corp-logo img{position:absolute;width:176px;height:auto;left:0;top:-25px}.product-name{border-left:1px solid var(--line);padding-left:17px;max-width:120px;font-size:10px;line-height:1.35;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}.product-name b{display:block;color:var(--purple)}.top-right{display:flex;align-items:center;gap:24px;color:var(--muted);font-size:11px}.privacy{border:1px solid var(--line);background:rgba(255,255,255,.72);padding:9px 14px;border-radius:99px;display:flex;align-items:center;gap:8px}.privacy i{width:7px;height:7px;background:var(--red);border-radius:50%;box-shadow:0 0 0 5px rgba(219,1,3,.08)}.step{text-transform:uppercase;letter-spacing:.11em;font-weight:600}.progress{height:4px;position:absolute;left:5vw;right:5vw;top:104px;background:rgba(50,32,154,.06);z-index:5}.progress>div{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue) 55%,var(--red));transition:width .45s ease}.view{max-width:1380px;min-height:calc(100vh - 176px);margin:auto;position:relative;z-index:2}.hero{display:grid;grid-template-columns:1.04fr .96fr;align-items:center;gap:68px;padding:56px 0 70px}.hero-copy{padding-left:clamp(0px,3vw,45px)}.kicker,.eyebrow{color:var(--purple);text-transform:uppercase;letter-spacing:.16em;font-size:10px;font-weight:700}.kicker{display:flex;gap:12px;align-items:center}.kicker span{color:#fff;background:linear-gradient(135deg,var(--purple),var(--blue));border-radius:99px;padding:5px 8px}.hero h1,.intro h1,.question h1,.result h1{color:var(--purple);font-size:clamp(48px,5.8vw,88px);line-height:1;letter-spacing:-.055em;margin:25px 0;font-weight:700}.hero h1 em{display:block;color:var(--red);font-style:normal}.hero p,.intro p,.question p{color:var(--muted);font-size:16px;line-height:1.75;max-width:630px}.primary{border:0;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border-radius:99px;padding:16px 19px 16px 25px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:22px;box-shadow:0 13px 30px rgba(50,32,154,.18);transition:.2s}.primary:hover{transform:translateY(-2px)}.primary:disabled{opacity:.35;cursor:not-allowed;transform:none}.primary .arrow{width:31px;height:31px;border-radius:50%;background:#fff;color:var(--red);display:grid;place-items:center}.proof{display:flex;gap:25px;margin-top:38px;color:var(--muted);font-size:11px}.proof span{padding-right:23px;border-right:1px solid var(--line)}.proof span:last-child{border:0}.proof b{color:var(--purple);font-size:17px;margin-right:5px}.visual{position:relative;height:min(610px,67vh);min-height:500px}.orbit{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1px solid rgba(50,32,154,.18);border-radius:50%}.orbit.outer{width:520px;height:520px;animation:spin 34s linear infinite}.orbit.inner{width:310px;height:310px;border-style:dashed;animation:spinBack 24s linear infinite}.orbit:after{content:"";position:absolute;width:9px;height:9px;border-radius:50%;background:var(--red);top:12%;left:17%;box-shadow:0 0 0 7px rgba(219,1,3,.08)}.core{position:absolute;width:182px;height:182px;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);background:linear-gradient(145deg,var(--blue),var(--purple) 58%,var(--red));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 0 22px rgba(50,32,154,.045),0 28px 80px rgba(50,32,154,.28)}.core span{font-size:11px;text-transform:uppercase;letter-spacing:.08em}.core b{font-size:28px}.signal{position:absolute;width:178px;padding:16px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:17px;box-shadow:0 18px 50px rgba(50,32,154,.13);display:grid;grid-template-columns:38px 1fr;grid-template-rows:auto auto}.signal>span{grid-row:1/3;width:32px;height:32px;border-radius:9px;background:var(--lavender);display:grid;place-items:center;color:var(--red)}.signal b{font-size:12px;color:var(--purple)}.signal small{font-size:9px;color:var(--muted)}.s1{top:7%;left:14%;transform:rotate(-4deg)}.s2{top:22%;right:0;transform:rotate(3deg)}.s3{bottom:10%;right:11%;transform:rotate(-3deg)}.s4{bottom:17%;left:0;transform:rotate(4deg)}.stage{display:grid;grid-template-columns:.9fr 1.1fr;align-items:center;gap:10vw;padding:75px 7vw}.intro h1{font-size:clamp(40px,4.8vw,68px);line-height:1.06}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:27px;padding:clamp(24px,4vw,48px);box-shadow:var(--shadow)}label{display:block;margin-bottom:24px}label>span,.aim>span{display:block;text-transform:uppercase;color:var(--purple);font-size:9px;letter-spacing:.15em;font-weight:700;margin:0 0 9px}input,textarea{width:100%;border:1px solid var(--line);background:#f8f8ff;color:var(--ink);border-radius:13px;padding:16px 17px;outline:none}input:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(50,32,154,.07)}.full{width:100%;justify-content:space-between}.consent{color:#89889e;font-size:9px;text-align:center;line-height:1.6}.error{color:var(--red);font-size:11px;margin:8px 0}.quiz{padding:57px 5vw 74px}.question{display:flex;justify-content:space-between;align-items:end;gap:30px;margin-bottom:34px}.question h1{font-size:clamp(37px,4.1vw,61px);margin-bottom:10px}.question p{margin:0}.count{font-size:54px;font-weight:800;color:var(--red)}.count span{font-size:17px;color:var(--muted)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}.choice{min-height:127px;display:grid;grid-template-columns:56px 1fr 28px;align-items:center;gap:18px;text-align:left;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:19px;padding:22px;cursor:pointer;transition:.2s}.choice:hover{transform:translateY(-2px);box-shadow:0 13px 32px rgba(50,32,154,.09)}.choice.selected{border-color:var(--purple);background:linear-gradient(135deg,var(--lavender),#fff);box-shadow:inset 4px 0 0 var(--red)}.choice-icon{width:48px;height:48px;border-radius:14px;background:var(--lavender);display:grid;place-items:center;font-size:21px;color:var(--purple)}.choice-copy{display:flex;flex-direction:column;gap:7px}.choice-copy b{font-size:14px}.choice-copy small{color:var(--muted);font-size:11px;line-height:1.45}.check{width:24px;height:24px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;color:transparent;font-size:11px}.selected .check{background:var(--red);color:#fff;border-color:var(--red)}.aim{display:grid;grid-template-columns:.55fr 1.45fr;gap:6px 24px;margin-top:16px;padding:22px;border:1px solid var(--line);border-radius:19px;background:#fff}.aim>b{grid-column:1;font-size:13px}.aim textarea{grid-column:2;grid-row:1/3;resize:vertical}.actions{display:flex;justify-content:space-between;align-items:center;margin-top:28px}.text{background:none;border:0;color:var(--muted);cursor:pointer}.result{padding:48px 5vw 65px}.result-grid{display:grid;grid-template-columns:1.35fr .65fr;gap:7vw;align-items:center;margin-top:22px;padding:clamp(26px,4vw,50px);border:1px solid var(--line);border-radius:30px;background:rgba(255,255,255,.93);box-shadow:var(--shadow);position:relative;overflow:hidden}.result-grid:before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:linear-gradient(var(--purple),var(--accent),var(--red))}.unit-logo{width:250px;height:100px;border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden;position:relative}.unit-logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transform:scale(1.4)}.unit-logo.iirc img{transform:none;padding:11px 15px}.result-unit{color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:.16em;font-weight:700;margin-top:22px}.result h1{font-size:clamp(39px,4.5vw,64px);line-height:1.06;margin:16px 0 21px}.summary{color:var(--muted);font-size:14px;line-height:1.75}.focus{display:flex;gap:9px;flex-wrap:wrap;margin-top:29px}.focus span{border:1px solid var(--line);background:#f8f8ff;border-radius:99px;padding:10px 14px;font-size:10px}.focus i{color:var(--accent);font-style:normal;font-weight:700;margin-right:8px}.aside{display:flex;flex-direction:column;gap:14px}.score{width:168px;height:168px;align-self:center;border-radius:50%;border:2px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 0 0 15px rgba(50,32,154,.035)}.score b{font-size:39px;color:var(--purple)}.score small{text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-size:9px}.next{padding:20px;border-radius:17px;border:1px solid var(--line);background:#f8f8ff}.next span{color:var(--accent);text-transform:uppercase;font-size:8px;letter-spacing:.15em;font-weight:700}.next p{font-size:11px;line-height:1.6}.status{color:var(--muted);font-size:9px}.result-foot{margin-top:27px;display:flex;justify-content:space-between;align-items:end}.prepared{display:grid;gap:3px}.prepared span{font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}.prepared b{font-size:13px;color:var(--purple)}.prepared small{color:var(--muted)}footer{max-width:1380px;margin:auto;min-height:70px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;color:#8c8ba0;text-transform:uppercase;letter-spacing:.12em;font-size:8px}.enter{animation:enter .5s ease both}.hidden{display:none!important}@keyframes enter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes spinBack{to{transform:translate(-50%,-50%) rotate(-360deg)}}
    .profile-download{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:30px;padding:19px 20px;border:1px solid rgba(50,32,154,.13);border-radius:18px;background:linear-gradient(135deg,rgba(240,239,255,.9),rgba(255,255,255,.96))}.profile-download-copy{display:flex;align-items:center;gap:13px}.profile-download-icon{flex:0 0 38px;width:38px;height:38px;border-radius:11px;background:#fff;color:var(--red);display:grid;place-items:center;border:1px solid var(--line);font-size:17px}.profile-download-copy b{display:block;color:var(--purple);font-size:12px}.profile-download-copy small{display:block;color:var(--muted);font-size:9px;line-height:1.45;margin-top:3px}.profile-download-button{flex:0 0 auto;display:inline-flex;align-items:center;gap:10px;border-radius:99px;padding:12px 17px;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;text-decoration:none;font-size:10px;font-weight:700;box-shadow:0 10px 23px rgba(50,32,154,.16);transition:transform .2s ease,box-shadow .2s ease}.profile-download-button:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(50,32,154,.22)}.profile-download-button span{width:24px;height:24px;border-radius:50%;background:#fff;color:var(--red);display:grid;place-items:center;font-size:13px}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.stage{grid-template-columns:1fr;gap:35px}.choices{grid-template-columns:1fr}.result-grid{grid-template-columns:1fr}.visual{height:520px}.aside{display:grid;grid-template-columns:168px 1fr;align-items:center}}
    @media(max-width:620px){.shell{padding:0 22px}.topbar{height:86px}.corp-logo{width:145px;height:42px}.corp-logo img{width:145px;top:-21px}.product-name,.top-right{display:none}.progress{left:22px;right:22px;top:84px}.view{min-height:calc(100vh - 142px)}.hero{padding:64px 0 40px}.hero h1{font-size:48px}.visual{height:400px;min-height:400px;transform:scale(.78);margin:-45px -65px}.stage{padding:55px 0}.quiz,.result{padding:45px 0 55px}.question{align-items:start}.question h1{font-size:37px}.choice{grid-template-columns:46px 1fr 24px;padding:17px}.aim{grid-template-columns:1fr}.aim>*{grid-column:1!important;grid-row:auto!important}.result-grid{padding:24px 19px}.aside{grid-template-columns:1fr}.profile-download{align-items:stretch;flex-direction:column}.profile-download-button{justify-content:space-between;width:100%}.result-foot{gap:18px}footer span:last-child{display:none}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <button class="brand" id="homeButton" aria-label="Back to start">
        <span class="corp-logo"><img src="assets/itsb-corporation.png" alt="ITSB Corporation"></span>
        <span class="product-name">Company Priority <b>Navigator</b></span>
      </button>
      <div class="top-right"><span class="privacy"><i></i> Secure assessment</span><span class="step" id="stepLabel">2 min experience</span></div>
    </header>
    <div class="progress hidden" id="progress"><div id="progressFill"></div></div>
    <div id="app"></div>
    <footer><span>Built for meaningful business conversations.</span><span>ITSB Corporation · From Insight to Impact</span></footer>
  </main>
  <script>
    const questions=[
      {title:"What’s your company priority?",helper:"Choose the direction that matters most right now.",choices:[
        ["Find new opportunities","Understand markets, customers, and emerging possibilities.","↗",{discovery:3,consulting:1}],
        ["Improve business performance","Turn strategic goals into measurable execution.","◎",{consulting:3,discovery:1}],
        ["Build innovation capability","Equip teams with digital, research, and practical skills.","✦",{iirc:3,consulting:1}],
        ["Strengthen people & leadership","Create aligned, resilient, high-performing teams.","⌁",{exceed:3,iirc:1}]]},
      {title:"What is slowing progress down?",helper:"Pick the challenge that best describes your current situation.",choices:[
        ["We need clearer insight","Decisions still rely on assumptions or fragmented data.","◌",{discovery:3,consulting:1}],
        ["Strategy is not translating into action","Priorities exist, but ownership and execution are uneven.","→",{consulting:3,exceed:1}],
        ["Our capability needs to catch up","New technology or methods require stronger internal skills.","△",{iirc:3,discovery:1}],
        ["Teams are not fully aligned","Collaboration, leadership, or culture is holding us back.","∞",{exceed:3,consulting:1}]]},
      {title:"Which outcome would create the most value?",helper:"Imagine the result you want to see in the next 6–12 months.",choices:[
        ["A validated opportunity map","Evidence, scenarios, and a clear direction for growth.","⌖",{discovery:3,consulting:1}],
        ["A practical transformation roadmap","Prioritized initiatives, owners, and measurable outcomes.","▦",{consulting:3,discovery:1}],
        ["A future-ready workforce","Applied learning that translates directly into work.","◇",{iirc:3,exceed:1}],
        ["A stronger leadership system","Better decisions, collaboration, and team ownership.","✺",{exceed:3,iirc:1}]]}
    ];
    const results={
      discovery:{unit:"ITSB Discovery",title:"Turn uncertainty into a clear opportunity map.",summary:"Your answers suggest that stronger evidence and sharper market understanding should come before a major move.",focus:["Market & customer insight","Opportunity validation","Applied research & scenarios"],next:"Start with a focused discovery sprint to validate the most important question.",accent:"#db0103",logo:"assets/itsb-discovery.png"},
      consulting:{unit:"ITSB Consulting",title:"Connect ambition to measurable execution.",summary:"Your company is ready to move, but needs a structured roadmap that turns priorities into coordinated action.",focus:["Strategy & transformation","Operating model improvement","Governance & performance"],next:"Begin with a diagnostic workshop to define the transformation agenda and quick wins.",accent:"#32209a",logo:"assets/itsb-consulting.png"},
      iirc:{unit:"IIRC",title:"Build the capability your next chapter needs.",summary:"Your desired outcome depends on equipping people with relevant, practical, and future-facing skills.",focus:["Capability assessment","Applied bootcamps","Digital & analytics enablement"],next:"Map the critical capability gaps, then design a learning journey around real work challenges.",accent:"#9412ae",logo:"assets/iirc.png"},
      exceed:{unit:"ITSB Exceed",title:"Strengthen the human system behind performance.",summary:"Your answers point to leadership, alignment, and collaboration as the highest-leverage place to intervene.",focus:["Leadership development","Team effectiveness","Culture & collaboration"],next:"Run a leadership alignment session to surface friction and set shared operating principles.",accent:"#db0103",logo:"assets/itsb-exceed.png"}
    };
    const state={screen:"welcome",company:"",gmail:"",q:0,answers:[],aim:""};
    const app=document.getElementById("app"),progress=document.getElementById("progress"),fill=document.getElementById("progressFill"),step=document.getElementById("stepLabel");
    const esc=s=>String(s).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    function setProgress(p){progress.classList.toggle("hidden",p===0);fill.style.width=p+"%";step.textContent=p?Math.round(p)+"% complete":"2 min experience"}
    function scores(){const s={discovery:0,consulting:0,iirc:0,exceed:0};state.answers.forEach((a,i)=>{const m=questions[i].choices[a]?.[3]||{};Object.entries(m).forEach(([k,v])=>s[k]+=v)});return s}
    function priority(){const s=scores();return Object.keys(s).sort((a,b)=>s[b]-s[a])[0]}
    function render(){window.scrollTo({top:0,behavior:"smooth"});if(state.screen==="welcome")return welcome();if(state.screen==="identity")return identity();if(state.screen==="quiz")return quiz();result()}
    function welcome(){setProgress(0);app.innerHTML=`<section class="view hero enter"><div class="hero-copy"><div class="kicker"><span>01</span> From Insight to Impact</div><h1>What should your company <em>focus on next?</em></h1><p>Answer four quick signals and connect your current priority to the right ITSB Corporation business pillar.</p><button class="primary" id="start">Find our priority <span class="arrow">→</span></button><div class="proof"><span><b>4</b> signals</span><span><b>2</b> minutes</span><span><b>1</b> tailored direction</span></div></div><div class="visual" aria-hidden="true"><div class="orbit outer"></div><div class="orbit inner"></div><div class="signal s1"><span>↗</span><b>Opportunity</b><small>Discovery</small></div><div class="signal s2"><span>◎</span><b>Performance</b><small>Consulting</small></div><div class="signal s3"><span>✦</span><b>Capability</b><small>IIRC</small></div><div class="signal s4"><span>⌁</span><b>Leadership</b><small>Exceed</small></div><div class="core"><span>Integrated</span><b>impact</b></div></div></section>`;document.getElementById("start").onclick=()=>{state.screen="identity";render()}}
    function identity(){setProgress(12);app.innerHTML=`<section class="view stage enter"><div class="intro"><div class="eyebrow">01 / 05</div><h1>First, who are we exploring for?</h1><p>Two details help us save your result and make the recommendation relevant.</p></div><form class="card" id="identityForm"><label><span>Company</span><input id="company" value="${esc(state.company)}" placeholder="e.g. Nusantara Energy" required></label><label><span>Gmail</span><input id="gmail" value="${esc(state.gmail)}" placeholder="name@gmail.com" type="email" required></label><div class="error" id="formError"></div><button class="primary full">Continue <span class="arrow">→</span></button><p class="consent">This standalone file stores the latest result only on this device.</p></form></section>`;document.getElementById("identityForm").onsubmit=e=>{e.preventDefault();const c=document.getElementById("company").value.trim(),g=document.getElementById("gmail").value.trim();if(!c||!/^\S+@gmail\.com$/i.test(g)){document.getElementById("formError").textContent="Enter a company and an active Gmail address.";return}state.company=c;state.gmail=g;state.screen="quiz";render()}}
    function quiz(){setProgress(25+state.q*22);const q=questions[state.q],selected=state.answers[state.q];app.innerHTML=`<section class="view quiz enter"><div class="question"><div><div class="eyebrow">0${state.q+2} / 05 · Business signal 0${state.q+1}</div><h1>${q.title}</h1><p>${q.helper}</p></div><div class="count">${state.q+1}<span>/3</span></div></div><div class="choices">${q.choices.map((c,i)=>`<button class="choice ${selected===i?"selected":""}" data-index="${i}"><span class="choice-icon">${c[2]}</span><span class="choice-copy"><b>${c[0]}</b><small>${c[1]}</small></span><span class="check">✓</span></button>`).join("")}</div>${state.q===2?`<label class="aim"><span>In your own words</span><b>What are you currently aiming for as a company?</b><textarea id="aim" rows="3" placeholder="For example: expand into a new segment while improving team capability...">${esc(state.aim)}</textarea></label>`:""}<div class="error" id="quizError"></div><div class="actions"><button class="text" id="back">← Back</button><button class="primary" id="next" ${selected===undefined?"disabled":""}>${state.q===2?"Reveal recommendation":"Next signal"} <span class="arrow">→</span></button></div></section>`;document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{state.answers[state.q]=Number(b.dataset.index);quiz()});document.getElementById("back").onclick=()=>{if(state.q===0){state.screen="identity"}else state.q--;render()};document.getElementById("next").onclick=()=>{if(state.q<2){state.q++;render();return}state.aim=document.getElementById("aim").value.trim();if(!state.aim){document.getElementById("quizError").textContent="Tell us briefly what your company is aiming for.";return}state.screen="result";render()}}
    async function saveResponse(payload){
      const status=document.getElementById("saveStatus");
      try{
        const response=await fetch("/api/responses",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        const data=await response.json().catch(()=>({saved:false,error:"Invalid server response"}));
        if(!response.ok||!data.saved)throw new Error(data.error||"Could not save response");
        if(status){status.textContent="● Response saved to Google Sheets";status.style.color="#353fc0"}
      }catch(error){
        localStorage.setItem("company-priority-latest",JSON.stringify(payload));
        if(status){status.textContent="● Google Sheets unavailable — saved on this device";status.style.color="#b36a00"}
        console.error("Response storage failed:",error);
      }
    }
    function result(){setProgress(100);const p=priority(),r=results[p],s=scores(),match=Math.round(s[p]/9*100);const payload={company:state.company,gmail:state.gmail,aim:state.aim,answers:state.answers.map((a,i)=>questions[i].choices[a][0]),priority:p,recommendedUnit:r.unit,scores:s,submittedAt:new Date().toISOString()};app.innerHTML=`<section class="view result enter" style="--accent:${r.accent}"><div class="eyebrow">✓ Your priority signal is ready</div><div class="result-grid"><div><div class="unit-logo ${p===`iirc`?`iirc`:``}"><img src="${r.logo}" alt="${r.unit} logo"></div><p class="result-unit">Recommended direction · ${r.unit}</p><h1>${r.title}</h1><p class="summary">${r.summary}</p><div class="focus">${r.focus.map((f,i)=>`<span><i>0${i+1}</i>${f}</span>`).join("")}</div><div class="profile-download"><div class="profile-download-copy"><span class="profile-download-icon">↓</span><div><b>Continue exploring ITSB Corporation</b><small>Get our 2026 company profile and discover our integrated capabilities.</small></div></div><a class="profile-download-button" href="assets/ITSB-Company-Profile-2026.pdf" download="ITSB-Company-Profile-2026.pdf">Download profile <span>↓</span></a></div></div><aside class="aside"><div class="score"><b>${match}%</b><small>priority match</small></div><div class="next"><span>Suggested next step</span><p>${r.next}</p></div><div class="status" id="saveStatus">● Saving response…</div></aside></div><div class="result-foot"><div class="prepared"><span>Prepared for</span><b>${esc(state.company)}</b><small>${esc(state.gmail)}</small></div><button class="text" id="restart">Start another assessment ↗</button></div></section>`;document.getElementById("restart").onclick=reset;saveResponse(payload)}
    function reset(){Object.assign(state,{screen:"welcome",company:"",gmail:"",q:0,answers:[],aim:""});render()}
    document.getElementById("homeButton").onclick=reset;render();
  </script>
</body>
</html>
